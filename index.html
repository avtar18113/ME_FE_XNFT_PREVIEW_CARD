<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Preview Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="main">
    <article class="card">
      <div class="card__images">
        <img class="card__images-product" src="assets/image-equilibrium.jpg" alt="Equilibrium NFT crystal cube">
        <div class="card__images-layer" aria-hidden="true">
          <img src="assets/icon-view.svg" alt="">
        </div>
      </div>

      <a class="card__title" href="#">Equilibrium #3429</a>
      <p class="card__description">Our Equilibrium collection promotes balance and calm.</p>

      <div class="card__time">
        <div class="card__time-left">
          <img src="assets/icon-ethereum.svg" alt="Ethereum">
          <span>0.041 ETH</span>
        </div>
        <div class="card__time-right">
          <img src="assets/icon-clock.svg" alt="Time left">
          <span>3 days left</span>
        </div>
      </div>

      <div class="card__creator">
        <img src="assets/logo.jpeg" alt="Creator Jules Wyvern">
        <p>Creation of <a href="https://github.com/avtar18113" target="_blank" rel="noopener noreferrer">Jules Wyvern</a></p>
      </div>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.crio.do" target="_blank" rel="noopener noreferrer">Crio.Do</a>.
    Coded by <a href="https://github.com/avtar18113" target="_blank" rel="noopener noreferrer">Ram Avtar</a>.
  </footer>
</body>
</html>
